name: Bug Report
description: Report broken asset behavior
title: "[Bug Report] "
labels: [type:bug, status:needs-triage]
body:
  - type: dropdown
    id: provider
    attributes:
      label: Affected provider
      options:
        - Claude
        - Codex
        - Gemini
        - Open-source
        - Provider-neutral canonical asset
        - All providers
    validations:
      required: true
  - type: dropdown
    id: asset
    attributes:
      label: Asset type
      options:
        - Agent
        - Skill
        - Command
        - Workflow
        - Guide
        - Installer
        - Portal
        - Provider adapter
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or request
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
  - type: checkboxes
    id: license_impact
    attributes:
      label: License, commercial, or trademark impact
      options:
        - label: This request may affect license, commercial-use, ownership, trademark, brand, or homepage language.
        - label: This request does not affect license, commercial-use, ownership, trademark, brand, or homepage language.
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - critical
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: release
    attributes:
      label: Release target
      options:
        - next patch
        - next minor
        - backlog
        - not sure
    validations:
      required: true
