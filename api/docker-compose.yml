services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nunneri
      POSTGRES_PASSWORD: nunneri
      POSTGRES_DB: nunneri
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nunneri"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
